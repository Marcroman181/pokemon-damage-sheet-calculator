<div class="modal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{{title}}</h5>
                <button type="button" class="btn-close btn-close-white" (click)="close()"></button>
            </div>
            <div class="modal-body">
                <div class="c-import-text">                
                    <span class="c-ta-center">Import file:</span>
                </div>
                <input type="file" class="file-upload" (change)="changeFile($event)">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="close()">Close</button>
                <button type="button" class="btn btn-primary" [disabled]="!file" (click)="importSheet()">Import</button>
            </div>
        </div>
    </div>
</div>
