   <div class="row">

        <div class="col-12 col-lg-4">

            <pokemon-autocomplete [pokedexSuggestions]="pokedexSuggestions" [initializedPokemon]="pokemon.name"
                (selectedPokemon)="selectPokemon($event)">

            </pokemon-autocomplete>

            <pokemon-level [initializedLevel]="pokemon.level" (level)="selectLevel($event)">
            </pokemon-level>

            <div class="row justify-content-start">
                <div class="col">
                    <pokemon-type [type]="pokemonDex.type" (changeType)="selectType($event)">
                    </pokemon-type>
                </div>
                <div class="col">
                    <pokemon-type [type]="pokemonDex.type2" (changeType)="selectType2($event)">
                    </pokemon-type>
                </div>
            </div>

            <pokemon-nature [nature]="pokemon.nature" (changeNature)="selectNature($event)">
            </pokemon-nature>
        </div>

        <div class="col-12 col-lg-4">
            <pokemon-stats *ngIf="pokemon" [pokemonStats]="pokemon.stats" [pokemonName]="pokemon.name"
                [level]="pokemon.level" [nature]="pokemon.nature" (changeStats)="changeStats($event)">
            </pokemon-stats>
        </div>


        <div class="col-12 col-lg-4">
            <pokemon-move [move]="pokemon.move1" (changeMove)="selectMove(1, $event)">
            </pokemon-move>

            <pokemon-move [move]="pokemon.move2" (changeMove)="selectMove(2, $event)">
            </pokemon-move>

            <pokemon-move [move]="pokemon.move3" (changeMove)="selectMove(3, $event)">
            </pokemon-move>

            <pokemon-move [move]="pokemon.move4" (changeMove)="selectMove(4, $event)">
            </pokemon-move>
        </div>
    </div>
