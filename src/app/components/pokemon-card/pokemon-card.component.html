<mat-card class="example-card">

        <mat-card-header>
            <mat-card-title>Pokemon</mat-card-title>
            <mat-card-subtitle>
                <pokemon-autocomplete
                    [pokedexSuggestions]="pokedexSuggestions"
                    [initializedPokemon]="pokemon.name"
                    (selectedPokemon)="selectPokemon($event)">

                </pokemon-autocomplete>

            </mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>

            <div class="mat-elevation-z8">

                <pokemon-level 
                    [initializedLevel]="50"
                    (level)="selectLevel($event)">
                </pokemon-level>

                <pokemon-stats *ngIf="pokemonDex"
                    [pokemon]="pokemonDex"
                    [level]="pokemon.level"
                    (stats)="changeStats($event)">
                </pokemon-stats>

            </div>

        </mat-card-content>

</mat-card>
