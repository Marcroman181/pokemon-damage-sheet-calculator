<form [formGroup]="form">
    <div class="form-group">
        <select formControlName="type" class="c-input-primary">
            <option class="c-option-primary" selected value="None">None</option>
            <option class="c-option-primary" *ngFor="let pokemonType of types" [value]="pokemonType">
                {{pokemonType}}
            </option>
        </select>
    </div>
</form>
