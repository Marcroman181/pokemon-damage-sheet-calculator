<div class="modal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Export pokemon sheet</h5>
                <button type="button" class="btn-close" (click)="close()"></button>
            </div>
            <div class="modal-body">                
                <span class="c-ta-center"> Sheet name</span>
                <input class="form-control" type="text" placeholder="File Name" aria-label="Number" [(ngModel)]="fileName">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="close()">Close</button>
                <button type="button" class="btn btn-primary" (click)="exportSheet()">Export</button>
            </div>
        </div>
    </div>
</div>
