<div class="container">
    <pokemon-card [initializePokemon]="pokemon" (pokemonModified)="modifyPokemon($event)">

    </pokemon-card>

    <div class="row">
        <div class="btn-group btn-group-toggle" data-toggle="buttons">
   
            <input type="radio" class="btn-check" name="btnradio" id="defensiveCalcs" autocomplete="off" [checked]="!offensiveCalcs">
            <label class="btn btn-secondary" [ngClass]="{'active': !offensiveCalcs}" (click)="setOffensivecalcs(false)">Defensive</label>
            
            <input type="radio" class="btn-check" name="btnradio" id="offensiveCalcs" autocomplete="off" [checked]="offensiveCalcs">
            <label class="btn btn-secondary" [ngClass]="{'active': offensiveCalcs}" (click)="setOffensivecalcs(true)">Offensive</label>

        </div>
    </div>

    <opponent-pokemon-container [userPokemon]="pokemon" [offensiveCalcs]="offensiveCalcs">

    </opponent-pokemon-container>
</div>
